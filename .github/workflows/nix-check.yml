
name: Nix Flake Check and Format

on:
  push:
    paths:
      - 'ci-tools/host-runner/**'
  pull_request:
    paths:
      - 'ci-tools/host-runner/**'

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Install Nix
        uses: cachix/install-nix-action@19effe9fe722874e6d46dd7182e4b8b7a43c4a99 #v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Enable Nix Flakes
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf

          mkdir -p secrets/google
          touch secrets/hostrunner-pass
          touch secrets/google/prod

      - name: Nix Format Check
        run: nix fmt --check
        working-directory: ci-tools/host-runner
